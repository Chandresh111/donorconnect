<!DOCTYPE html>
<html>
  <head>
    <title>Edit Campaign</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        background: #f4f7fc;
        padding: 40px;
      }

      .container {
        max-width: 900px;
        margin: auto;
      }

      .card {
        background: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      }

      h1 {
        margin-bottom: 25px;
        color: #1e293b;
      }

      .form-group {
        margin-bottom: 20px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
      }

      input,
      textarea {
        width: 100%;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 15px;
      }

      textarea {
        min-height: 120px;
        resize: vertical;
      }

      .btn {
        background: #2563eb;
        color: white;
        border: none;
        padding: 12px 25px;
        border-radius: 8px;
        cursor: pointer;
      }

      .btn:hover {
        background: #1d4ed8;
      }

      .back-btn {
        margin-left: 15px;
        text-decoration: none;
        color: #475569;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="card">
        <h1>Edit Campaign</h1>

        <form action="/update_campaign/{{ campaign.id }}" method="POST">
          <div class="form-group">
            <label>Campaign Title</label>

            <input
              type="text"
              name="title"
              value="{{ campaign.title }}"
              required
            />
          </div>

          <div class="form-group">
            <label>Description</label>

            <textarea name="description" required>
{{ campaign.description }}</textarea
            >
          </div>

          <div class="form-group">
            <label>Target Amount</label>

            <input
              type="number"
              step="0.01"
              name="target_amount"
              value="{{ campaign.target_amount }}"
              required
            />
          </div>

          <div class="form-group">
            <label>Raised Amount</label>

            <input
              type="number"
              step="0.01"
              name="raised_amount"
              value="{{ campaign.raised_amount }}"
              required
            />
          </div>

          <div class="form-group">
            <label>Start Date</label>

            <input
              type="date"
              name="start_date"
              value="{{ campaign.start_date }}"
              required
            />
          </div>

          <div class="form-group">
            <label>End Date</label>

            <input
              type="date"
              name="end_date"
              value="{{ campaign.end_date }}"
              required
            />
          </div>

          <button class="btn">Update Campaign</button>

          <a href="/campaigns" class="back-btn"> Cancel </a>
        </form>
      </div>
    </div>
  </body>
</html>
