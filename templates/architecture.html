<!DOCTYPE html>
<html>
  <head>
    <title>AWS Architecture</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        display: flex;
        min-height: 100vh;
        background: #f1f5f9;
      }

      .sidebar {
        width: 260px;
        min-height: 100vh;
        background: #0f172a;
        color: white;
        padding: 30px;
      }

      .sidebar h2 {
        color: #fbbf24;
        margin-bottom: 50px;
      }

      .sidebar a {
        display: block;
        color: white;
        text-decoration: none;
        padding: 15px;
        margin-bottom: 10px;
        border-radius: 10px;
      }

      .sidebar a:hover {
        background: #1e293b;
      }

      .main {
        flex: 1;
        padding: 40px;
      }

      h1 {
        color: #1e293b;
        margin-bottom: 10px;
      }

      .subtitle {
        color: #64748b;
        margin-bottom: 35px;
        font-size: 18px;
      }

      .architecture {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 15px;
      }

      .box {
        width: 350px;
        background: white;
        padding: 20px;
        text-align: center;
        border-radius: 15px;
        font-weight: bold;
        color: #1e293b;
        font-size: 18px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      }

      .arrow {
        font-size: 30px;
        color: #2563eb;
        font-weight: bold;
      }

      /* Sidebar */

      .sidebar {
        width: 250px;
        background: #0f172a;
        color: white;
        padding: 30px;
      }

      .sidebar h2 {
        margin-bottom: 40px;
        color: #fbbf24;
      }

      .menu-item {
        display: block;
        text-decoration: none;
        color: white;
        padding: 15px;
        margin-bottom: 10px;
        border-radius: 10px;
        transition: 0.3s;
      }

      .menu-item:hover {
        background: #1e293b;
      }
    </style>
  </head>

  <body>
    <!-- Sidebar -->

    <div class="sidebar">
      <h2>DonorConnect</h2>

      <a href="/dashboard"> Dashboard </a>

      <a href="/donors"> Donors </a>

      <a href="/campaigns"> Campaigns </a>

      <a href="/reports"> Reports </a>

      <a href="/architecture"> Architecture </a>
    </div>

    <!-- Main Content -->

    <div class="main">
      <h1>AWS Cloud Architecture</h1>

      <p class="subtitle">Infrastructure Design for DonorConnect</p>

      <div class="architecture">
        <div class="box">Users</div>

        <div class="arrow">↓</div>

        <div class="box">Route 53 DNS</div>

        <div class="arrow">↓</div>

        <div class="box">Application Load Balancer</div>

        <div class="arrow">↓</div>

        <div class="box">EC2 Flask Server</div>

        <div class="arrow">↓</div>

        <div class="box">RDS MySQL Database</div>

        <div class="arrow">↓</div>

        <div class="box">S3 File Storage</div>

        <div class="arrow">↓</div>

        <div class="box">CloudWatch Monitoring</div>
      </div>
    </div>
  </body>
</html>
